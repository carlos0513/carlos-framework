kind: Deployment
apiVersion: apps/v1
metadata:
  name: #APP_NAME
  namespace: #NAMESPACE
  labels:
    app: #APP_NAME
spec:
  replicas: 1
  selector:
    matchLabels:
      app: #APP_NAME
  template:
    metadata:
      labels:
        app: #APP_NAME
    spec:
      automountServiceAccountToken: false
      containers:
        -
          name: #APP_NAME
          image: #APP_IMAGE_NAME
          imagePullPolicy: IfNotPresent
          ports:
            -
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "500Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          env: #ENV_LIST
            -
              name: TZ
              value: Asia/Shanghai
            -
              name: PROFILE
              value: deploy
