kind: Deployment
apiVersion: apps/v1
metadata:
  name: #APP_NAME
  namespace: #NAMESPACE
  labels:
    app: #APP_NAME
spec:
  replicas: 1
  selector:
    matchLabels:
      app: #APP_NAME
  template:
    metadata:
      labels:
        app: #APP_NAME
    spec:
      containers:
        -
          name: #APP_NAME
          image: #APP_IMAGE_NAME
          ports:
            -
              containerPort: #SERVER_PORT
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "500m"
            limits:
              cpu: "1000m"
              memory: "5Gi"
          env:
            -
              name: TZ
              value: Asia/Shanghai
            -
              name: NACOS_ADDR
              value: '192.168.1.169:18848'
            -
              name: SERVER_PORT
              value: '#SERVER_PORT'
            -
              name: NACOS_NAMESPACE
              value: 'yunjin-bbt-master'
            -
              name: NACOS_USERNAME
              value: 'yunjin'
            -
              name: NACOS_PASSWORD
              value: 'Yunjin@123456'
            -
              name: DEFAULT_PASSWORD
              value: '@bbt2023'
            -
              name: "update_uuid"
              value: "#APP_UUID"    #生成的随机值，放置执行kubectl apply时能够执行
            # redis配置
            -
              name: REDIS_IP
              value: 192.168.1.169
            -
              name: REDIS_PORT
              value: "16379"
            -
              name: REDIS_DB
              value: "1"
            -
              name: REDIS_PWD
              value: 'yunjin@123456'

---
apiVersion: v1
kind: Service
metadata:
  name: #APP_NAME
  namespace: #NAMESPACE
spec:
  selector:
    app: #APP_NAME
  type: NodePort
  ports:
    -
      name: #APP_NAME
      port: #SERVER_PORT
      nodePort: #NODE_PORT






