server:
  port: ${SERVER_PORT:31611}
  servlet:
    context-path: /system
spring:
  profiles:
    active: env,boot
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB # 单文件最大限制
      max-request-size: 200MB # 一次上传所有文件的最大限制. 如果接口只支持单文件,则该值与上面相同即可
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  application:
    name: yunjin-system
  # spring配置
  datasource:
    druid:
      stat-view-servlet:
        enabled: true
        loginUsername: admin
        loginPassword: 123456
    dynamic:
      primary: master
      druid:
        initial-size: 5
        min-idle: 5
        maxActive: 20
        maxWait: 60000
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        validationQuery: SELECT 1 FROM DUAL
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false
        poolPreparedStatements: true
        breakAfterAcquireFailure: true
        ConnectionErrorRetryAttempts: 2
        maxPoolPreparedStatementPerConnectionSize: 20
        filters: stat,slf4j
        connection-properties:
          druid.stat.mergeSql: true
          druid.stat.slowSqlMillis: 5000
############################## application start ##############################
yunjin:
  boot:
    cors:
      enable: true
    enums:
      scan-package: com.carlos
      enabled: true
    # 自定义项目信息
    info:
      project-name: 系统服务
      groupId: com.carlos
      #            boot-name: @boot.artifact.name@
      author: yunjin
      description: 系统服务
      sourceEncoding: utf-8
      version: 1.0.0
      domain: www.yunjin.com
  cache:
    key-prefix: yunjin:single
    user-prefix: true

############################### application end ###############################



##############################  日志配置 start  ###########################
logging:
  config: classpath:config/logback.xml
  level:
    root: info
    com.carlos: debug
  file:
    path: log/system/
##############################  日志配置 end   ###########################


############################### mybatis-plus start #################################
mybatis-plus: # 启动时是否检查MyBatis XML文件是否存在
  check-config-location: true
  # 支持统配符 * 或者 ; 分割
  # MyBatis原生配置
  configuration: # 字段名称下划线转驼峰命名
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    call-setters-on-nulls: true
  global-config:
    db-config: # 全局默认主键类型
      id-type: assign_id
      # 逻辑已删除值(默认为 1)
      logic-delete-value: 1
      # 逻辑未删除值(默认为 0)
      logic-not-delete-value: 0
  # mapper xml映射路径
  mapper-locations: classpath*:mapper/**/*Mapper.xml
################################ mybatis-plus end ##################################



#################################### 接口文档 Swagger start #################################
swagger:
  enable: true
  # 扫描的包，多个包使用逗号隔开
  base-package: com.carlos.system
  description: 系统服务
  title: 系统服务
  version: 2.0.0
  terms-of-service-url: https://www.yunjin.com
  contact:
    email: 13032820513@163.com
    name: yunjin
    url: www.yunjin.com
    group-name: 系统服务

knife4j: # 是否开启Knife4j增强模式 默认 false
  enable: true
  # 是否是生产环境
  production: false
  # knife4j配置
  cors: false
  # 个性化配置 详情配置参照源码
  setting: # 是否开启Debug调试
    enableDebug: true
    language: zh-CN
    enableSwaggerModels: true
    enableDocumentManage: true
    swaggerModelName: 实体类列表
    enableVersion: true
    enableReloadCacheParameter: false
    enableAfterScript: true
    enableFilterMultipartApiMethodType: POST
    enableFilterMultipartApis: false
    enableRequestCache: true
    enableHost: false
    enableHostText: 192.168.0.193:8000
    # 是否开启自定义主页内容
    enableHomeCustom: false
    # 主页内容Markdown文件路径
    homeCustomLocation: classpath:markdown/home.md
    # 开启搜索
    enableSearch: true
    # 显示页底信息
    enableFooter: false
    enableFooterCustom: true
    footerCustomContent: 云津智慧科技有限公司
    # 动态参数调试
    enableDynamicParameter: true
    # 显示OpenAPI规范
    enableOpenApi: true
    enableGroup: true
  # 是否开启BasicHttp验证
  basic:
    enable: false
    username: yunjin
    password: hadoop543216
#################################### 接口文档 Swagger end ###################################