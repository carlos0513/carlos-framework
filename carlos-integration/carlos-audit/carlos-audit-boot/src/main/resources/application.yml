server:
  port: 31810
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 128KB
  undertow:
    threads:
      io: 8
      worker: 32
    buffer-size: 1024
    direct-buffers: true
  servlet:
    context-path: /
spring:
  profiles:
    active: env,boot
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 200MB
  application:
    name: carlos-audit
  datasource:
    dynamic:
      primary: master
      strict: false #严格匹配数据源,默认false. true未匹配到指定数据源时抛异常,false使用默认数据源
      grace-destroy: false #是否优雅关闭数据源，默认为false，设置为true时，关闭数据源时如果数据源中还存在活跃连接，至多等待10s后强制关闭
      datasource:
        master:
          url: jdbc:clickhouse://10.200.200.2:18123/carlos-framework?compress=true&max_execution_time=30
          username: admin
          password: Hadoop@2022
          driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
      druid:
        break-after-acquire-failure: false
        fail-fast: true
        connection-error-retry-attempts: 10
        initial-size: 5
        min-idle: 5
        max-active: 600
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        validation-query: SELECT 1
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
        connection-properties:
          druid.stat.mergeSql: false
          druid.stat.slowSqlMillis: 5000
    druid:
      stat-view-servlet:
        enabled: true
        loginUsername: admin
        loginPassword: 123456


############################## application start ##############################
carlos:
  boot:
    cors:
      enable: true
    enums:
      scan-package: com.carlos.test
      enabled: true
    info:
      project-name: carlos-audit
      groupId: com.carlos
      author: Carlos
      description:
      sourceEncoding: utf-8
      version: 1.0.0-SNAPSHOT
      domain: www.zcarlos.com
  cache:
    key-prefix: carlos:audit
    user-prefix: true

############################ application end ###############################

management:
  endpoints:
    web:
      exposure:
        include: "*"


##############################  日志配置 start  ###########################
logging:
  config: classpath:config/logback.xml
  level:
    root: info
    com.carlos: debug
  file:
    path: log/audit/
##############################  日志配置 end   ###########################


---
# 启用 OpenAPI
carlos:
  openapi:
    enable: true
    # 基本信息
    title: "Carlos 框架 API 文档"
    description: "基于 Spring Boot 3 的微服务框架"
    version: "3.0.0"

    # 联系人信息
    contact:
      name: "技术支持"
      email: "support@example.com"
      url: "https://example.com"

    # 许可证信息
    license: "Apache 2.0"
    license-url: "https://www.apache.org/licenses/LICENSE-2.0"

# ==========================================
# Knife4j 核心配置（必须）
# ==========================================
knife4j:
  # 是否启用 Knife4j（生产环境建议关闭）
  enable: true
  # 生产环境安全配置
  production: false  # true=生产环境，关闭文档
  # 基础认证配置（访问文档页面的登录认证）
  basic:
    enable: false           # 是否启用基础认证
    username: admin         # 登录用户名
    password: 123456        # 登录密码
  # ==========================================
  # 个性化配置（界面定制）
  # ==========================================
  setting:
    # 语言：ZH_CN（中文）、EN（英文）
    language: ZH_CN

    # ==========================================
    # 界面功能开关
    # ==========================================
    # 是否显示文档管理功能
    enable-document-manage: true
    # 是否显示 Swagger Models
    enable-swagger-models: true
    swagger-model-name: Swagger Models
    # 是否显示主机信息
    enable-host: true
    # 是否显示请求参数缓存
    enable-request-cache: true
    # 针对RequestMapping的接口请求类型,在不指定参数类型的情况下,如果不过滤,默认会显示7个类型的接口地址参数,如果开启此配置,默认展示一个Post类型的接口地址
    enable-filter-multipart-apis: true
    # 具体接口的过滤类型
    enable-filter-multipart-api-method-type: POST
    # 是否开启动态参数调试
    enable-dynamic-parameter: true
    # 是否显示 OpenAPI 规范
    enable-open-api: true
    # 是否显示搜索框
    enable-search: true
    # 是否显示 AfterScript 功能
    enable-after-script: true
    # 是否显示分组下拉框
    enable-group: true
    # 是否显示响应状态码
    enable-response-code: true
    # 是否在每个调试调试条后显示刷新变量按钮，但默认不会显示
    enable-reload-cache-parameter: false
    enable-debug: true
    # 是否开启自定义主页内容
    enable-home-custom: false
    # 首页文档路径（自定义 markdown 文档）
    home-custom-path: classpath:markdown/home.md
    # 是否开启界面中对某接口的版本控制,如果开启，后端变化后Ui界面会存在小蓝点
    enable-version: true
    enable-footer: false
    enable-footer-custom: false
    # 自定义Footer内容
    footer-custom-content: "自定义Footer内容"

# ==========================================
# SpringDoc OpenAPI 原生配置（底层依赖）
# ==========================================
springdoc:
  # 是否启用 API Docs
  api-docs:
    enabled: true
    # API Docs 访问路径
    path: /v3/api-docs
    # 是否启用属性解析器
    resolve-schema-properties: true
  # Swagger UI 配置（Knife4j 会覆盖部分配置）
  swagger-ui:
    enabled: true
    # UI 访问路径（Knife4j 使用自己的 UI）
    path: /swagger-ui.html
    # 操作排序：alpha（字母）、method（HTTP方法）
    operations-sorter: method
    # 标签排序
    tags-sorter: alpha
    # 默认展开深度
    doc-expansion: list
    # 是否显示请求时长
    display-request-duration: true
  # 包扫描配置
  packages-to-scan: com.carlos
  # 路径匹配配置
  paths-to-match: '/**'
  # 路径排除配置
  paths-to-exclude: /error, /actuator/**
  # 缓存配置
  cache:
    disabled: false  # 生产环境建议启用缓存
  # 模型配置
  #  model-converters:
  #    # 是否启用 Pageable 转换器
  #    pageable-converter:
  #      enabled: true
  #    # 是否启用 Deprecating 转换器
  #    deprecating-converter:
  #      enabled: true
  # 显示配置
  show-actuator: false      # 是否显示 Actuator 端点
  show-login-endpoint: false  # 是否显示登录端点
  # 分组配置（与 Knife4j 分组配合使用）
  group-configs:
    # 分组1：默认分组
    -
      group: 审计日志
      display-name: 审计日志
      packages-to-scan: com.carlos
      paths-to-match: /audit/**
#      paths-to-exclude: /api/audit/**


