server:
  port: 9520

spring:
  profiles:
    active: ${PROFILE:local}
  application:
    name: carlos-auth
  cloud:
    nacos:
      discovery:
        enabled: true
      config:
        enabled: true
        file-extension: yml
        refresh-enabled: true
  config:
    import:
      # 1. 公共配置（所有环境共享）
      #      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      # 2. 环境专属配置（覆盖公共配置）
      #      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      # 3. 额外共享配置（如 Redis、MySQL 配置）
      - optional:nacos:common.yml?DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:redis.yml?DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:mysql.yml?DEFAULT_GROUP&refreshEnabled=true

# 本地调试环境
---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    nacos:
      username: ${NACOS_USERNAME:@nacos.username@}
      password: ${NACOS_PASSWORD:@nacos.password@}
      discovery:
        server-addr: ${NACOS_ADDR:@nacos.addr@}
        namespace: ${NACOS_NAMESPACE:@nacos.namespace@}
        group: ${NACOS_GROUP:@nacos.group@}
      config:
        server-addr: ${NACOS_ADDR:@nacos.addr@}
        namespace: ${NACOS_NAMESPACE:@nacos.namespace@}
        group: ${NACOS_GROUP:@nacos.group@}


# 部署采用配置文件
---
spring:
  config:
    activate:
      on-profile: deploy
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        server-addr: ${NACOS_ADDR}
        namespace: ${NACOS_NAMESPACE}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_ADDR}
        namespace: ${NACOS_NAMESPACE}
        group: ${NACOS_GROUP:DEFAULT_GROUP}



---
spring:
  # spring配置
  datasource:
    druid:
      stat-view-servlet:
        enabled: true
        loginUsername: admin
        loginPassword: 123456
    dynamic:
      primary: master
      druid:
        initial-size: 5
        min-idle: 5
        maxActive: 20
        maxWait: 60000
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        validationQuery: SELECT 1 FROM DUAL
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false
        poolPreparedStatements: true
        breakAfterAcquireFailure: true
        ConnectionErrorRetryAttempts: 2
        maxPoolPreparedStatementPerConnectionSize: 20
        filters: stat,slf4j
        connection-properties:
          druid.stat.mergeSql: true
          druid.stat.slowSqlMillis: 5000
############################## application start ##############################
carlos:
  boot:
    cors:
      enable: true
    enums:
      scan-package: com.carlos
      enabled: true
  cache:
    key-prefix: carlos:bbt:auth
    use-prefix: true
  encrypt:
    # SM4 国密对称加密配置
    sm4:
      enabled: true                      # 启用 SM4 加密
      encrypt-mode: cbc                  # 加密模式：cbc 或 ecb
      key: "asdfghjklmnbvcx"            # 密钥（16 字节，不足会自动 MD5 处理）
      iv: "mnbvcxzpoiuytre1"            # 初始化向量（CBC 模式必需，16 字节）
      store-type: base64                 # 存储格式：base64 或 hex

    # SM2 国密非对称加密配置
    sm2:
      enabled: true                      # 启用 SM2 加密
      public-key: "0403c7a7250306531238d49c2e0146e48217f2d65b28ed1d61565bd40472c7516bc78574de0a89f9067328558d656ecdc2504f49bb2bd843a9cfa9b404463ed453"
      private-key: "3134665e1e009bab370738fd5ff1dabc7f390b683885c321f1523f4f725e8aa1"
      store-type: base64                 # 存储格式：base64 或 hex
############################### application end ###############################


##############################  日志配置 start  ###########################
logging:
  config: classpath:config/logback.xml
  level:
    root: info
    com.carlos: debug
    org.springframework.security: debug
  file:
    path: log/carlos/auth
##############################  日志配置 end   ###########################


############################### mybatis-plus start #################################
mybatis-plus: # 启动时是否检查MyBatis XML文件是否存在
  check-config-location: true
  # 支持统配符 * 或者 ; 分割
  # MyBatis原生配置
  configuration: # 字段名称下划线转驼峰命名
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    call-setters-on-nulls: true
  global-config:
    db-config: # 全局默认主键类型
      id-type: assign_id
      # 逻辑已删除值(默认为 1)
      logic-delete-value: 1
      # 逻辑未删除值(默认为 0)
      logic-not-delete-value: 0
  # mapper xml映射路径
  mapper-locations: classpath*:mapper/**/*Mapper.xml
################################ mybatis-plus end ##################################



#################################### 接口文档 Swagger start #################################
knife4j: # 是否开启Knife4j增强模式 默认 false
  enable: true
  # 是否是生产环境
  production: false
  # knife4j配置
  cors: false
  # 个性化配置 详情配置参照源码
  setting: # 是否开启Debug调试
    enableDebug: true
    language: zh-CN
    enableSwaggerModels: true
    enableDocumentManage: true
    swaggerModelName: 实体类列表
    enableVersion: true
    enableReloadCacheParameter: false
    enableAfterScript: true
    enableFilterMultipartApiMethodType: POST
    enableFilterMultipartApis: false
    enableRequestCache: true
    enableHost: false
    enableHostText: 192.168.0.193:8000
    # 是否开启自定义主页内容
    enableHomeCustom: false
    # 主页内容Markdown文件路径
    homeCustomLocation: classpath:markdown/home.md
    # 开启搜索
    enableSearch: true
    # 显示页底信息
    enableFooter: false
    enableFooterCustom: true
    footerCustomContent: 云津智慧科技有限公司
    # 动态参数调试
    enableDynamicParameter: true
    # 显示OpenAPI规范
    enableOpenApi: true
    enableGroup: true
  # 是否开启BasicHttp验证
  basic:
    enable: false
    username: carlos
    password: hadoop543216
#################################### 接口文档 Swagger end ###################################
