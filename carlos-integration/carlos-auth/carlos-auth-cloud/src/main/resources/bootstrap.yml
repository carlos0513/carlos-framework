server:
  port: 9520

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  profiles:
    active: ${PROFILE:local}
  application:
    name: carlos-auth
  cloud:
    nacos:
      discovery:
        enabled: true
      config:
        enabled: true
        file-extension: yml
        refresh-enabled: true
        shared-configs:
          -
            data-id: share-config.yml
            refresh: true
          -
            data-id: mysql.yml
            refresh: true
          -
            data-id: redis.yml
            refresh: true

# 本地调试环境
---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    nacos:
      username: ${NACOS_USERNAME:@nacos.username@}
      password: ${NACOS_PASSWORD:@nacos.password@}
      discovery:
        server-addr: ${NACOS_ADDR:@nacos.addr@}
        namespace: ${NACOS_NAMESPACE:@nacos.namespace@}
        group: ${NACOS_GROUP:@nacos.group@}
      config:
        server-addr: ${NACOS_ADDR:@nacos.addr@}
        namespace: ${NACOS_NAMESPACE:@nacos.namespace@}
        group: ${NACOS_GROUP:@nacos.group@}


# 部署采用配置文件
---
spring:
  config:
    activate:
      on-profile: deploy
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        server-addr: ${NACOS_ADDR}
        namespace: ${NACOS_NAMESPACE}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_ADDR}
        namespace: ${NACOS_NAMESPACE}
        group: ${NACOS_GROUP:DEFAULT_GROUP}