server:
  port: 9812

spring:
  application:
    name: carlos-message

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/carlos_message?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

  # Redis配置
  redis:
    host: localhost
    port: 6379
    database: 0

# 消息中心配置
carlos:
  message:
    enabled: true
    consumer-id: message-consumer-1
    queue:
      type: redis
      stream-prefix: stream:message
      consumer-group: message-consumer-group
      consumer-count: 3
    rate-limiter:
      enabled: true
      default-qps: 100
    retry:
      max-attempts: 3
      initial-interval: 1000
      multiplier: 2
      max-interval: 30000

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    com.carlos.message: debug
