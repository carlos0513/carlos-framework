    type: redis
  data:
    redis:
      database: 15
      host: 100.127.6.234
      port: 16379
      password: ${REDIS_PASSWORD:your-redis-password}
      #      host: 127.0.0.1
      #      port: 26379
      #      password: 'HJbgx_7281&'
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          max-wait: 30s
          min-idle: 10
        shutdown-timeout: 100ms
  #    redisson:
  #      config: |
  #        {
  #          "masterSlaveServersConfig": {
  #            "masterAddress": "redis://100.127.6.234:16379",
  #            "slaveAddresses": [
  #              "redis://100.127.6.234:16379"
  #            ],
  #            "database": "14",
  #            "password": "yunjin@123456",
  #            "readMode": "MASTER_SLAVE",
  #            "masterConnectionPoolSize": 64,
  #            "slaveConnectionPoolSize": 64
  #          }
  #        }
  ##############################  redis缓存配置 end   ###########################

  application:
    name: carlos-test
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB # 单文件最大限制
      max-request-size: 200MB # 一次上传所有文件的最大限制. 如果接口只支持单文件,则该值与上面相同即可
  datasource:
    druid:
      stat-view-servlet:
        enabled: true
        loginUsername: admin
        loginPassword: 123456
    dynamic:
      primary: master
      datasource:
        # 主库数据源
        master:
          url: jdbc:mysql://100.127.6.234:13306/carlos_bbt?useUnicode=true&characterEncoding=UTF-8&userSSL=false&serverTimezone=GMT%2B8
          driver-class-name: com.mysql.cj.jdbc.Driver
          username: ${DB_USERNAME:root}
          password: ${DB_PASSWORD:your-db-password}
      druid:
        initial-size: 5
        min-idle: 5
        maxActive: 20
        maxWait: 60000
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        validationQuery: SELECT 1 FROM DUAL
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false
        poolPreparedStatements: true
        breakAfterAcquireFailure: true
        ConnectionErrorRetryAttempts: 2
        maxPoolPreparedStatementPerConnectionSize: 20
        filters: stat,slf4j
        connection-properties:
          druid.stat.mergeSql: true
          druid.stat.slowSqlMillis: 5000

############################### mybatis-plus start #################################
mybatis-plus: # 启动时是否检查MyBatis XML文件是否存在
  check-config-location: true
  # 支持统配符 * 或者 ; 分割
  # MyBatis原生配置
  configuration: # 字段名称下划线转驼峰命名
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    call-setters-on-nulls: true
  global-config:
    db-config: # 全局默认主键类型
      id-type: assign_id
      # 逻辑已删除值(默认为 1)
      logic-delete-value: 1
      # 逻辑未删除值(默认为 0)
      logic-not-delete-value: 0
  # mapper xml映射路径
  mapper-locations: classpath*:mapper/**/*Mapper.xml
################################ mybatis-plus end ##################################


