carlos:
  sms:
  # 标注从yml读取配置
  config-type: yaml
  #用于标定yml中的配置是否开启短信拦截，接口配置不受此限制
  restricted: false
  #短信拦截限制单手机号每日最大发送量，只对开启了拦截的配置有效
  account-max: 20
  #短信拦截限制单手机号每分钟最大发送，只对开启了拦截的配置有效
  minute-max: 5
  #核心线程池大小
  corePoolSize: 5
  #最大线程数
  maxPoolSize: 16
  #队列容量
  queueCapacity: 50
  #设置线程池关闭的时候等待所有任务都完成再继续销毁其他的Bean
  shutdownStrategy: true
  templates:
    gecode:
      code: gecode
      template-id: 6302
      content: '您的验证码是：{code}，请在10分钟内输入。'
      signature: '【云津智慧】'
    event01:
      code: event01
      template-id: 5864
      content: '您好，您待处理的事件已被督办，请尽快处理，事件编号{eventId}。'
      signature: '【云津智慧】'
  blends:
    chuanglan:
      #厂商标识，标定此配置是哪个厂商，详细请看厂商标识介绍部分
      supplier: chuanglan
      #您的accessKey
      access-key-id: YZM4174302
      #您的accessKeySecret
      access-key-secret: yvjkx11Vr2fa7f
      # 随机权重，负载均衡的权重值依赖于此，默认为1，如不需要负载均衡可不进行配置
      weight: 0
      #短信自动重试间隔时间  默认五秒
      retry-interval: 5
      # 短信重试次数，默认0次不重试，如果你需要短信重试则根据自己的需求修改值即可
      max-retries: 0
    wocloud:
      #厂商标识，标定此配置是哪个厂商，详细请看厂商标识介绍部分
