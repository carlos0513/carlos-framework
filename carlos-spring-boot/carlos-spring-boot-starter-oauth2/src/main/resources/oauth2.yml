# OAuth2配置示例

# 启用OAuth2模块
carlos:
  oauth2:
    enabled: true

    # JWT配置
    jwt:
      algorithm: RS256
      key-id: carlos-key-id
      issuer: http://localhost:8080
      include-user-info: true

    # 授权服务器配置
    authorization-server:
      enabled: true
      authorization-endpoint: /oauth2/authorize
      token-endpoint: /oauth2/token
      token-revocation-endpoint: /oauth2/revoke
      token-introspection-endpoint: /oauth2/introspect
      jwk-set-endpoint: /oauth2/jwks
      authorization-code-time-to-live: 5m
      access-token-time-to-live: 2h
      refresh-token-time-to-live: 7d
      reuse-refresh-tokens: false

    # 资源服务器配置
    resource-server:
      enabled: false
      # jwk-set-uri: http://localhost:8080/oauth2/jwks
      # issuer-uri: http://localhost:8080
      permit-all-paths:
        - /public/**
        - /health

    # 客户端配置
    # 注意：Spring Authorization Server 1.x 已移除对 password 授权类型的支持
    # 建议使用 authorization_code + PKCE 模式替代
    clients:
      -
        client-id: carlos-client
        client-secret: carlos-secret
        client-name: carlos Client
        # 支持的授权类型：authorization_code, refresh_token, client_credentials
        # 注意：password 授权类型已被 Spring Authorization Server 1.x 移除支持
        authorization-grant-types:
          - authorization_code
          - refresh_token
          - client_credentials
          # - password  # 已废弃，不建议使用
        redirect-uris:
          - http://localhost:8080/login/oauth2/code/carlos
          - http://localhost:8080/authorized
        scopes:
          - read
          - write
          - all
        require-authorization-consent: false
        require-proof-key: false
        access-token-time-to-live: 2h
        refresh-token-time-to-live: 7d
