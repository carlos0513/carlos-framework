server:
  port: 9800

spring:
  application:
    name: carlos-sample-gateway

  cloud:
    gateway:
      # 开启网关日志
      httpclient:
        wiretap: true
      # 网关全局配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      # 路由配置
      routes:
        # 示例1：路径路由到 HTTP 地址
        -
          id: http_route
          uri: http://httpbin.org
          predicates:
            - Path=/httpbin/**
          filters:
            - StripPrefix=1

        # 示例2：负载均衡路由到服务
        -
          id: lb_route
          uri: lb://carlos-test
          predicates:
            - Path=/api/test/**
          filters:
            - StripPrefix=2

        # 示例3：带有自定义过滤器的路由
        -
          id: custom_route
          uri: http://httpbin.org
          predicates:
            - Path=/custom/**
          filters:
            - StripPrefix=1
            -
              name: CustomGatewayFilter
              args:
                paramName: X-Request-Source
                paramValue: CarlosGateway

      # 默认过滤器（应用到所有路由）
      default-filters:
        - AddRequestHeader=X-Gateway-Name, Carlos-Sample-Gateway
        - AddResponseHeader=X-Gateway-Version, 3.0.0

      # 网关发现定位器（从注册中心获取路由）
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

# Carlos 网关配置
carlos:
  boot:
    gateway:
      # API 文档聚合配置
      knife4j:
        enabled: true
        # 需要聚合的服务
        services:
          -
            name: carlos-test
            url: /v3/api-docs
            context-path: /
      # OAuth2 资源服务器配置
      oauth2:
        enabled: false
        # JWT 配置
        jwt:
          issuer-uri: http://localhost:9810
        # 白名单路径（无需认证）
        whitelist:
          paths:
            - /actuator/**
            - /doc.html
            - /webjars/**
            - /v3/api-docs/**
            - /swagger-ui/**
            - /favicon.ico

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO

# Actuator 端点
management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
