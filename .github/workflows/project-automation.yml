# =============================================================================
# GitHub Project 自动化工作流
# 自动管理 Issue 和 PR 的状态标签
# =============================================================================

name: Project Automation

on:
  issues:
    types:
      - opened
      - reopened
      - closed
      - assigned
      - unassigned
  pull_request:
    types:
      - opened
      - reopened
      - closed
      - converted_to_draft
      - ready_for_review
      - review_requested

jobs:
  # ===========================================================================
  # Issue 状态自动管理
  # ===========================================================================
  manage-issue-status:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      -
        name: Update Issue Status Labels
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const action = context.payload.action;

            // 获取当前标签
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });

            const labelNames = currentLabels.map(l => l.name);
            const labelsToAdd = [];
            const labelsToRemove = [];

            // 根据状态更新标签
            switch (action) {
              case 'opened':
              case 'reopened':
                labelsToAdd.push('status-todo');
                labelsToRemove.push('status-done');
                // 如果没有优先级标签，添加默认优先级
                if (!labelNames.some(l => l.startsWith('priority-'))) {
                  labelsToAdd.push('priority-medium');
                }
                break;

              case 'closed':
                labelsToAdd.push('status-done');
                labelsToRemove.push('status-todo', 'status-doing');
                break;

              case 'assigned':
                labelsToAdd.push('status-doing');
                labelsToRemove.push('status-todo');
                break;
            }

            // 添加新标签
            for (const label of labelsToAdd) {
              if (!labelNames.includes(label)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [label]
                });
                console.log(`Added label: ${label}`);
              }
            }

            // 移除旧标签
            for (const label of labelsToRemove) {
              if (labelNames.includes(label)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: label
                });
                console.log(`Removed label: ${label}`);
              }
            }

  # ===========================================================================
  # PR 与 Issue 关联自动管理
  # ===========================================================================
  link-pr-to-issue:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    steps:
      -
        name: Link PR to Issue
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // 解析 PR 描述中的 Fixes/Closes 关键字
            const issueRefs = body.match(/(fixes|closes|resolves|#)\s*#(\d+)/gi) || [];

            if (issueRefs.length > 0) {
              console.log(`Found issue references: ${issueRefs.join(', ')}`);

              // 提取 Issue 编号
              const issueNumbers = issueRefs
                .map(ref => ref.match(/#(\d+)/)?.[1])
                .filter(Boolean)
                .map(Number);

              // 更新关联的 Issue 状态
              for (const issueNumber of issueNumbers) {
                try {
                  // 添加 doing 标签
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    labels: ['status-doing']
                  });

                  // 移除 todo 标签
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: 'status-todo'
                  }).catch(() => {}); // 忽略不存在的标签错误

                  console.log(`Updated issue #${issueNumber} to status-doing`);
                } catch (error) {
                  console.log(`Failed to update issue #${issueNumber}: ${error.message}`);
                }
              }
            }

  # ===========================================================================
  # PR 合并时自动关闭关联 Issue
  # ===========================================================================
  close-linked-issues:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged
    steps:
      -
        name: Close Linked Issues
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // 解析 PR 描述中的 Fixes/Closes 关键字
            const issueRefs = body.match(/(fixes|closes|resolves)\s*#(\d+)/gi) || [];

            for (const ref of issueRefs) {
              const issueNumber = ref.match(/#(\d+)/)?.[1];
              if (issueNumber) {
                try {
                  // 关闭 Issue
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: parseInt(issueNumber),
                    state: 'closed'
                  });

                  // 添加评论
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: parseInt(issueNumber),
                    body: `✅ 此 Issue 已在 PR #${pr.number} 中解决并合并。`
                  });

                  console.log(`Closed issue #${issueNumber}`);
                } catch (error) {
                  console.log(`Failed to close issue #${issueNumber}: ${error.message}`);
                }
              }
            }
