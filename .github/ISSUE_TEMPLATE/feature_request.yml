name: Feature Request
about: Suggest an idea for this project
title: '[FEATURE] '
labels: [ 'enhancement', 'needs-triage' ]
body:
  -
    type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature!
        Please provide as much detail as possible to help us understand your idea.

  -
    type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What category does this feature belong to?
      options:
        - New starter module
        - Enhancement to existing module
        - Security improvement
        - Performance optimization
        - Developer experience
        - Documentation
        - Testing
        - Other
      default: 0

  -
    type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: A clear description of the problem or limitation you're experiencing...
    validations:
      required: true

  -
    type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see
      placeholder: What would the ideal solution look like?
    validations:
      required: true

  -
    type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Describe any alternative solutions or features you've considered
      placeholder: Are there other ways to solve this problem?

  -
    type: textarea
    id: use-cases
    attributes:
      label: Use Cases
      description: Provide specific use cases where this feature would be beneficial
      placeholder: |
        1. When building microservices that need...
        2. In scenarios where performance is critical...
        3. For teams that require...

  -
    type: textarea
    id: api
    attributes:
      label: API Design (if applicable)
      description: Proposed API design or usage examples
      render: java
      placeholder: |
        // Example usage
        @Autowired
        private NewFeatureService service;

        public void example() {
            service.doSomething();
        }

  -
    type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Would improve development experience
        - High - Significantly improves functionality
        - Critical - Blocking important use cases
      default: 1

  -
    type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        -
          label: I would be willing to implement this feature
        -
          label: This feature requires changes to the core framework
        -
          label: This feature affects multiple modules

  -
    type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        -
          label: I have searched existing issues to avoid duplicates
          required: true
        -
          label: This feature aligns with the project's goals
          required: true
        -
          label: I have considered the impact on existing code
          required: true
